<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural Shield Effect</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:monospace}
canvas{display:block;width:100vw;height:100vh}
#info{position:fixed;top:12px;left:12px;color:#4af;font-size:12px;z-index:10;text-shadow:0 0 10px #4af}
#title{position:fixed;top:12px;right:12px;color:#fff;font-size:11px;z-index:10;text-align:right}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">PROCEDURAL ENERGY SHIELD<br>VFX Demo | Raymarching + FBM + Hex Grid</div>
<div id="title">TA Technical Art<br>WebGL Demo</div>

<script>
var canvas=document.getElementById('c');
var gl=canvas.getContext('webgl2')||canvas.getContext('webgl');
if(!gl){document.body.innerHTML='<p style=color:#f00;padding:40px>WebGL not supported</p>';}

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener('resize',resize);
resize();

var VS=`attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0,1);}`;
var FS=`precision highp float;
uniform float u_t;
uniform vec2 u_r;
uniform float u_perturb;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){
  float v=0.,a=.5;
  for(int i=0;i<5;i++){v+=a*noise(p);p*=2.;a*=.5;}
  return v;
}

// Hex grid distance
vec2 hexCenter(vec2 p){
  vec2 r=vec2(1.,1.732);
  vec2 h=r*.5;
  vec2 a=mod(p,r)-h;
  vec2 b=mod(p-h,r)-h;
  return dot(a,a)<dot(b,b)?a:b;
}
float hexDist(vec2 p){
  p=abs(p);
  return max(dot(p,normalize(vec2(1,1.732))),p.x);
}
float hexGrid(vec2 uv,float scale,float thickness){
  vec2 p=uv*scale;
  vec2 h=hexCenter(p);
  float d=hexDist(h);
  return smoothstep(thickness,0.,abs(d-.4));
}

mat2 rot(float a){float c=cos(a),s=sin(a);return mat2(c,-s,s,c);}

float shieldSDF(vec3 p){
  float sphere=length(p)-1.;
  // Add rippling distortion
  float t=u_t*.5;
  float ripple=sin(p.x*4.+t)*sin(p.y*4.+t*1.3)*sin(p.z*4.+t*.7)*.08;
  return sphere+ripple;
}

vec3 calcNormal(vec3 p){
  vec2 e=vec2(.001,0);
  return normalize(vec3(
    shieldSDF(p+e.xyy)-shieldSDF(p-e.xyy),
    shieldSDF(p+e.yxy)-shieldSDF(p-e.yxy),
    shieldSDF(p+e.yyx)-shieldSDF(p-e.yyx)
  ));
}

void main(){
  vec2 uv=(gl_FragCoord.xy-.5*u_r)/u_r.y;
  float t=u_t;
  
  // Camera
  vec3 ro=vec3(0,0,2.8);
  vec3 rd=normalize(vec3(uv,-1.5));
  
  // Raymarch
  float d=0.;
  vec3 p;
  bool hit=false;
  for(int i=0;i<80;i++){
    p=ro+rd*d;
    float sdf=shieldSDF(p);
    if(sdf<.001){hit=true;break;}
    if(d>5.)break;
    d+=sdf*.7;
  }
  
  vec4 col=vec4(0.,0.,.02,1.);
  
  if(hit){
    vec3 n=calcNormal(p);
    vec3 v=normalize(ro-p);
    float fresnel=pow(1.-max(dot(n,v),0.),3.);
    
    // Hex grid in 3D space
    vec3 hexP=p*3.;
    vec2 hUV=hexP.xy+hexP.z*.5;
    float hex=hexGrid(hUV,1.,.08);
    
    // Animated hex pulse
    float pulse=sin(length(p)*6.-t*2.)*.5+.5;
    float hexBright=hex*pulse*fresnel;
    
    // Noise displacement on surface
    vec2 noiseUV=p.xy*2.+p.z+t*.2;
    float n1=fbm(noiseUV);
    float n2=fbm(noiseUV*2.+vec2(5.2,1.3));
    float n3=fbm(noiseUV*4.+vec2(1.7,9.2));
    float noiseFBM=n1*.5+n2*.3+n3*.2;
    
    // Color gradient based on normal + fresnel
    vec3 baseCol=mix(vec3(.0,.8,1.),vec3(.2,.4,1.),fresnel);
    vec3 energyCol=mix(vec3(0.,.6,1.),vec3(.5,.1,1.),noiseFBM);
    
    // Combine
    float shieldLine=hexBright+fresnel*.5;
    vec3 finalCol=baseCol*shieldLine+energyCol*fresnel*noiseFBM*2.;
    
    // Glow
    float glow=pow(fresnel,2.)*1.5;
    finalCol+=vec3(0.,.5,1.)*glow;
    
    col=vec4(finalCol,1.);
  }
  
  // Background grid
  vec2 bgUV=uv*8.;
  float bgGrid=hexGrid(bgUV,1.,.05)*.15;
  col.rgb+=vec3(.02,.05,.1)*bgGrid;
  
  // Vignette
  float vig=1.-dot(uv,uv)*.6;
  col.rgb*=vig;
  
  gl_FragColor=col;
}
`;

function createShader(src,type){
  var s=gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

var vs=createShader(VS,gl.VERTEX_SHADER);
var fs=createShader(FS,gl.FRAGMENT_SHADER);
var prog=gl.createProgram();
gl.attachShader(prog,vs);
gl.attachShader(prog,fs);
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

var buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
var loc=gl.getAttribLocation(prog,'a_pos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

var u_t=gl.getUniformLocation(prog,'u_t');
var u_r=gl.getUniformLocation(prog,'u_r');
var u_perturb=gl.getUniformLocation(prog,'u_perturb');

var t=0;
function render(){
  t+=1/60;
  gl.uniform1f(u_t,t);
  gl.uniform2f(u_r,canvas.width,canvas.height);
  gl.uniform1f(u_perturb,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
